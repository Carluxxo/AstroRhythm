name: Daily Task

on:
  schedule:
    # Executa todos os dias às 6:00 da manhã no horário de São Paulo (BRT)
    - cron: '0 9 * * *' # 6 AM BRT = 9 AM UTC
  workflow_dispatch: # Permite execução manual no GitHub Actions

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório (branch autorun)
        uses: actions/checkout@v3
        with:
          ref: autorun  # Especifica a branch autorun

      - name: 🌎 Configurar fuso horário para São Paulo
        run: |
          echo "TZ=America/Sao_Paulo" >> $GITHUB_ENV

      - name: 🛠 Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Instalar dependências
        run: npm install

      - name: 📡 Rodar script apod.js
        run: node apod.js
